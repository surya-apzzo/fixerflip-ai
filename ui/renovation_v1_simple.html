<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Renovation Preview</title>
    <style>
      :root {
        --bg: #0b1220;
        --bg-soft: #111a2e;
        --panel: #131f36;
        --panel-soft: #182746;
        --line: #263758;
        --line-strong: #355081;
        --text: #e7eeff;
        --muted: #9db0d3;
        --primary: #5b8cff;
        --primary-hover: #4779f0;
        --ok: #2dd67b;
        --err: #ff6b6b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(900px 500px at 10% -20%, #1f335e, transparent),
          radial-gradient(1000px 600px at 100% -30%, #182a50, transparent),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 840px;
        margin: 34px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 28px;
        margin: 0 0 22px;
        letter-spacing: 0.2px;
      }
      label {
        font-weight: 600;
        display: block;
        margin: 0 0 6px;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 11px 12px;
        font-size: 14px;
        color: var(--text);
        background: #0f1a30;
      }
      input:not([type="checkbox"]):not([type="radio"]),
      select:not([multiple]) {
        height: 44px;
      }
      .element-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 14px;
        padding: 10px 12px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #0f1a30;
      }
      .element-option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
      }
      .element-option input {
        width: auto;
        height: auto;
        margin: 0;
        accent-color: var(--primary);
      }
      .field-hint {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
      }
      .selected-elements {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .selected-element-bubble {
        border: 1px solid var(--line-strong);
        background: #102447;
        color: var(--text);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        line-height: 1.3;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(36, 93, 255, 0.12);
      }
      textarea {
        min-height: 112px;
        resize: vertical;
        line-height: 1.45;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 2px;
        align-items: start;
      }
      .field {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .grid .field label {
        margin: 0 0 7px;
        min-height: 22px;
        display: flex;
        align-items: flex-end;
      }
      .field-group {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        margin-top: 14px;
        background: var(--panel-soft);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field-group .group-title {
        margin: 0;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        background: var(--primary);
        border: none;
        color: #fff;
        padding: 11px 18px;
        border-radius: 8px;
        font-weight: 700;
        box-shadow: 0 8px 20px rgba(91, 140, 255, 0.35);
        cursor: pointer;
      }
      button:hover {
        background: var(--primary-hover);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .status {
        font-size: 13px;
        color: var(--muted);
      }
      .status.err {
        color: var(--err);
      }
      .status.ok {
        color: var(--ok);
      }
      pre {
        margin-top: 14px;
        background: #0b1428;
        color: #dce8ff;
        border-radius: 10px;
        padding: 12px;
        overflow: auto;
        border: 1px solid #1f3154;
      }
      .preview {
        margin-top: 14px;
      }
      .preview label {
        margin-top: 0;
      }
      .preview img {
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #0c162b;
      }
      .preview-hint {
        margin: 8px 0 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
      }
      .preview-hint.err {
        color: var(--err);
      }
      .output-label {
        margin: 18px 0 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>AI Renovation Estimator</h1>

        <div class="field-group">
          <p class="group-title">Image + AI Input</p>
          <label for="apiUrl">API endpoint</label>
          <input
            id="apiUrl"
            type="text"
            value="http://127.0.0.1:8000/api/v1/renovation/estimate"
          />

          <label for="imageUrl">Image URL</label>
          <input
            id="imageUrl"
            type="url"
            placeholder="https://example.com/property-photo.jpg"
          />

          <label for="userInputs">Instructions</label>
          <textarea
            id="userInputs"
            placeholder="Full renovation preview: e.g. Renovate this room — repair damage and show a clean finished space. Targeted: e.g. Only change the wall color to warm white."
          ></textarea>

          <div class="grid">
            <div class="field">
              <label for="typeOfRenovation">Type of renovation</label>
              <select id="typeOfRenovation">
                <option value="interior">interior</option>
                <option value="exterior">exterior</option>
              </select>
            </div>
            <div class="field">
              <label for="visualType">Visual type</label>
              <select id="visualType">
                <option value="select_elements_to_renovate">select elements to renovate</option>
                <option value="upload_my_own_reference_photo">upload my own reference photo</option>
                <option value="choose_an_existing_style">choose an existing style</option>
              </select>
            </div>
            <div class="field">
              <label for="referenceImageUrl">Reference image URL</label>
              <input
                id="referenceImageUrl"
                type="url"
                placeholder="https://example.com/reference-style.jpg"
              />
            </div>
          </div>
          <span class="group-label" style="display: block; margin-bottom: 6px; font-weight: 600"
            >Elements to renovate (optional, up to 3)</span
          >
          <div
            id="renovationElementOptions"
            class="element-options"
            role="group"
            aria-label="Elements to renovate"
          >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="flooring" />Flooring</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="paint" />Paint</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="lighting" />Lighting</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="furniture" />Furniture</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="kitchen" />Kitchen</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="bathroom" />Bathroom</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="windows" />Windows</label
            >
            <label class="element-option"
              ><input type="checkbox" name="renovation_element" value="doors" />Doors</label
            >
          </div>
          <p class="field-hint">
            Check up to 3 items; each choice appears as a bubble below. Submit when ready.
          </p>
          <div id="selectedElements" class="selected-elements"></div>
        </div>

        <div class="field-group">
          <p class="group-title">Property Inputs</p>
          <div class="grid">
            <div class="field">
              <label for="sqft">Sqft</label>
              <input id="sqft" type="number" value="1148" min="1" />
            </div>
            <div class="field">
              <label for="beds">Beds</label>
              <input id="beds" type="number" value="3" min="0" />
            </div>
            <div class="field">
              <label for="baths">Baths</label>
              <input id="baths" type="number" value="2" min="0" step="0.5" />
            </div>
          </div>
        </div>

        <div class="field-group">
          <p class="group-title">Cost Context</p>
          <div class="grid">
            <div class="field">
              <label for="quality">Desired Quality</label>
              <select id="quality">
                <option>cosmetic</option>
                <option value="standard">standard investor rehab</option>
                <option>premium</option>
                <option>luxury</option>
              </select>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn" type="button">Submit</button>
          <div id="status" class="status"></div>
        </div>

        <div class="preview">
          <label>Renovated image preview</label>
          <p id="previewHint" class="preview-hint" style="display: none"></p>
          <img
            id="previewImage"
            alt="Renovated output preview"
            style="display: none"
          />
        </div>

        <p class="output-label">API response (detail)</p>
        <pre id="output">{}</pre>
      </div>
    </div>

    <script>
      const apiUrl = document.getElementById("apiUrl");
      (function initApiEndpoint() {
        const defaultEndpoint =
          "http://127.0.0.1:8000/api/v1/renovation/estimate";
        if (
          window.location.protocol !== "http:" &&
          window.location.protocol !== "https:"
        ) {
          apiUrl.value = defaultEndpoint;
          return;
        }
        const port =
          window.location.port ||
          (window.location.protocol === "https:" ? "443" : "80");
        const portNum = Number(port);
        const servedFromApp =
          window.location.pathname.includes("/ui/") &&
          (portNum === 8000 || portNum === 8001);
        if (servedFromApp) {
          apiUrl.value = `${window.location.origin}/api/v1/renovation/estimate`;
        } else {
          apiUrl.value = defaultEndpoint;
        }
      })();
      const imageUrl = document.getElementById("imageUrl");
      const userInputs = document.getElementById("userInputs");
      const sqft = document.getElementById("sqft");
      const beds = document.getElementById("beds");
      const baths = document.getElementById("baths");
      const typeOfRenovation = document.getElementById("typeOfRenovation");
      const visualType = document.getElementById("visualType");
      const referenceImageUrl = document.getElementById("referenceImageUrl");
      const renovationElementOptions = document.getElementById("renovationElementOptions");
      const selectedElementsView = document.getElementById("selectedElements");
      const MAX_RENOVATION_ELEMENTS = 4;
      function getSelectedRenovationElements() {
        return Array.from(
          renovationElementOptions.querySelectorAll('input[name="renovation_element"]:checked'),
        )
          .map((input) => input.value.trim())
          .filter(Boolean)
          .slice(0, MAX_RENOVATION_ELEMENTS);
      }
      function renderSelectedElementBubbles() {
        const selectedElements = getSelectedRenovationElements();
        if (!selectedElements.length) {
          selectedElementsView.innerHTML = "";
          return;
        }
        selectedElementsView.innerHTML = selectedElements
          .map(
            (value) =>
              `<span class="selected-element-bubble">${value.charAt(0).toUpperCase() + value.slice(1)}</span>`,
          )
          .join("");
      }
      renovationElementOptions.addEventListener("change", (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLInputElement) || t.name !== "renovation_element") {
          return;
        }
        if (t.checked) {
          const checked = renovationElementOptions.querySelectorAll(
            'input[name="renovation_element"]:checked',
          );
          if (checked.length > MAX_RENOVATION_ELEMENTS) {
            t.checked = false;
          }
        }
        renderSelectedElementBubbles();
      });
      renderSelectedElementBubbles();
      const quality = document.getElementById("quality");
      const submitBtn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const previewImage = document.getElementById("previewImage");
      const previewHint = document.getElementById("previewHint");

      submitBtn.addEventListener("click", async () => {
        status.className = "status";
        previewImage.style.display = "none";
        previewImage.removeAttribute("src");
        previewHint.style.display = "none";
        previewHint.textContent = "";
        previewHint.className = "preview-hint";

        if (!apiUrl.value.trim()) {
          status.textContent = "API endpoint required.";
          status.classList.add("err");
          return;
        }
        if (!imageUrl.value.trim()) {
          status.textContent = "Image URL required.";
          status.classList.add("err");
          return;
        }

        const selectedElements = getSelectedRenovationElements();
        const targetStyle =
          selectedElements.length === 0
            ? "investor_standard"
            : selectedElements.length === 1
              ? selectedElements[0]
              : "targeted_elements";
        const payload = {
          image_url: imageUrl.value.trim(),
          user_inputs: userInputs.value.trim(),
          sqft: Number(sqft.value),
          beds: Number(beds.value),
          baths: Number(baths.value),
          type_of_renovation: typeOfRenovation.value,
          visual_type: visualType.value,
          reference_image_url: referenceImageUrl.value.trim(),
          renovation_elements: selectedElements,
          target_renovation_style: selectedElements.length ? targetStyle : "investor_standard",
          desired_quality_level: quality.value,
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";
        status.textContent = "Sending request...";

        try {
          const url = apiUrl.value.trim();
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const raw = await res.text();
          const ctype = (res.headers.get("content-type") || "")
            .split(";")[0]
            .trim()
            .toLowerCase();

          let body;
          const trimmed = raw.trimStart();
          if (
            ctype.includes("json") ||
            trimmed.startsWith("{") ||
            trimmed.startsWith("[")
          ) {
            try {
              body = raw ? JSON.parse(raw) : {};
            } catch {
              body = {
                _error: "Invalid JSON from server",
                snippet: raw.slice(0, 500),
              };
            }
          } else if (
            raw.trimStart().toLowerCase().startsWith("<!doctype") ||
            raw.trimStart().startsWith("<html")
          ) {
            body = {
              _error:
                "Server returned HTML, not JSON — usually wrong URL or a proxy/front-end error page.",
              status: res.status,
              content_type: ctype || "(missing)",
              expected_url_example:
                "http://127.0.0.1:8000/api/v1/renovation/estimate",
              requested_url: url,
              snippet: raw.slice(0, 400),
            };
          } else {
            try {
              body = raw ? JSON.parse(raw) : {};
            } catch {
              body = {
                _error: "Non-JSON response",
                content_type: ctype,
                snippet: raw.slice(0, 800),
              };
            }
          }

          output.textContent = JSON.stringify(
            { status: res.status, ok: res.ok, response: body },
            null,
            2,
          );

          const imageUrl = body?.renovated_image?.renovated_image_url;
          const imgErr = body?.renovated_image_error;
          if (imageUrl) {
            previewImage.src = imageUrl;
            previewImage.style.display = "block";
          } else if (imgErr) {
            previewHint.textContent = "Image preview failed: " + imgErr;
            previewHint.classList.add("err");
            previewHint.style.display = "block";
          } else if (res.ok && userInputs.value.trim() && !body._error) {
            previewHint.textContent =
              "No image returned. Ensure OPENAI_API_KEY is set on the server and the image URL is reachable.";
            previewHint.style.display = "block";
          }

          if (res.ok && !body._error) {
            status.textContent = "Success";
            status.classList.add("ok");
          } else {
            status.textContent = body._error
              ? "Wrong response type — check API URL"
              : "API returned error";
            status.classList.add("err");
          }
        } catch (err) {
          const fileHint =
            window.location.protocol === "file:"
              ? " If you opened this file from disk, use the server URL instead: http://127.0.0.1:8000/ui/renovation_v1_simple.html (with ./run.dev running)."
              : "";
          output.textContent = JSON.stringify(
            {
              error: "Request failed",
              message: String(err),
              hint:
                "Check that the API is running, the URL matches your server (scheme/host/port), and you are not mixing HTTPS page with HTTP API." +
                fileHint,
            },
            null,
            2,
          );
          status.textContent = "Request failed";
          status.classList.add("err");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit";
        }
      });
    </script>
  </body>
</html>
